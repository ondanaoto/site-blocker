<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>このサイトは現在ブロックされています</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #fafafa;
        color: #1a1a1a;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #f0f0f0;
        }
      }
      .box {
        text-align: center;
        max-width: 520px;
        padding: 32px;
      }
      h1 {
        font-size: 26px;
        margin: 0 0 16px;
      }
      .domain {
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 18px;
        background: rgba(127, 127, 127, 0.15);
        padding: 4px 10px;
        border-radius: 6px;
      }
      p {
        color: #777;
        line-height: 1.7;
      }
      a {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>⏱ 現在ブロック中</h1>
      <p><span class="domain" id="domain">—</span></p>
      <p>このサイトは設定された時間帯のためアクセスできません。</p>
      <p>
        <a href="#" id="openOptions">設定ページを開く</a>
      </p>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
