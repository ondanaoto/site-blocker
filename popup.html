<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Site Blocker</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        width: 280px;
        margin: 0;
        padding: 14px;
        background: #fafafa;
        color: #1a1a1a;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #f0f0f0;
        }
      }
      h2 {
        margin: 0 0 6px;
        font-size: 14px;
      }
      .section {
        margin-bottom: 12px;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        font-size: 13px;
      }
      li {
        padding: 3px 0;
        font-family: ui-monospace, Menlo, Consolas, monospace;
      }
      .muted {
        color: #777;
        font-size: 12px;
        font-family: inherit;
      }
      .ok {
        color: #16a34a;
      }
      .warn {
        color: #d97706;
      }
      button {
        width: 100%;
        padding: 8px;
        border: 1px solid #2563eb;
        background: #2563eb;
        color: white;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.1);
      }
    </style>
  </head>
  <body>
    <div class="section">
      <h2>ブロック中のサイト</h2>
      <ul id="activeList"><li class="muted">読み込み中…</li></ul>
    </div>
    <div class="section">
      <h2>編集窓</h2>
      <div id="windowInfo" class="muted">—</div>
    </div>
    <button id="settings">設定を開く</button>
    <script src="popup.js"></script>
  </body>
</html>
